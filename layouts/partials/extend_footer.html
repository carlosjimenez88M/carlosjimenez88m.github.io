<div class="newsletter-band">
  <div class="newsletter-band__inner">
    <p class="newsletter-band__line">New essays by email. No funnels, no filler.</p>
    <form
      action="https://buttondown.com/api/emails/embed-subscribe/carlosjimenez88m"
      method="post"
      class="newsletter-form"
      target="popupwindow"
      onsubmit="window.open('https://buttondown.com/carlosjimenez88m', 'popupwindow')"
    >
      <div class="newsletter-form__group">
        <input
          type="email"
          name="email"
          id="bd-email"
          placeholder="your@email.com"
          required
          aria-label="Email address"
        />
        <input type="submit" value="Subscribe" />
      </div>
    </form>
  </div>
</div>
