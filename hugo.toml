baseURL = "https://carlosdanieljimenez.com/"
title = "The Probability Engine"
theme = "PaperMod"
languageCode = "en-us"
defaultTheme = "light"

enableEmoji = true

[pagination]
  pagerSize = 5

[outputs]
  home = ["HTML", "RSS"]

[params]
  # SEO
  description = "Essays on AI Software Engineering, LLMOps, GCP, edge machine learning, and the use of NLP and LLMs to analyze music."
  author = "Carlos Daniel Jiménez"
  keywords = ["AI Software Engineering", "LLMOps", "GCP", "Edge AI", "Agentic AI", "Music NLP"]

  # Favicon
  [params.assets]
    favicon = "/img/icon.jpeg"
    favicon16x16 = "/img/icon.jpeg"
    favicon32x32 = "/img/icon.jpeg"
    apple_touch_icon = "/img/icon.jpeg"
    theme_color = "#f9fbfd"
    msapplication_TileColor = "#f9fbfd"

  # Profile Mode
  [params.profileMode]
    enabled = false
    title = "Carlos Daniel Jiménez"
    subtitle = "AI Software Engineering, LLMOps, GCP, edge systems, and music analysis with NLP and LLMs."
    imageUrl = "/img/perfil_con_emi.jpg"
    imageTitle = "Carlos Daniel Jiménez"
    imageWidth = 200
    imageHeight = 200

    buttons = [
      {name = "Start Here", url = "/start-here/"},
      {name = "AI Engineering", url = "/ai-engineering/"},
      {name = "Music + NLP", url = "/music-analysis/"},
      {name = "Follow", url = "/follow/"}
    ]

  # Home Info Params (alternativa a Profile Mode - comentado)
  # [params.homeInfoParams]
  #   Title = "MLOps × Edge AI × Agentic Systems"
  #   Content = "Building intelligent systems that run anywhere. From Raspberry Pi to Jetson Orin to production clusters."

  # Show RSS button in profile mode
  ShowRssButtonInSectionTermList = true
  mainSections = ["post"]

  # Social Icons
  [[params.socialIcons]]
    name = "email"
    url = "mailto:danieljimenez88m@gmail.com"

  [[params.socialIcons]]
    name = "twitter"
    url = "https://x.com/DanielJimenezM9"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/djimenezm"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/carlosjimenez88M"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  # Features
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  DateFormat = "January 2, 2006"

  # Algolia (mantener para custom implementation)
  algolia_search = true
  algolia_appId = ""
  algolia_indexName = ""
  algolia_apiKey = ""

# Menu Configuration
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Writing"
    url = "/post/"
    weight = 10

  [[menu.main]]
    identifier = "music"
    name = "Music"
    url = "/music-analysis/"
    weight = 15

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 20

# Markup configuration
[markup]
  [markup.tableOfContents]
    endLevel = 2
    startLevel = 1

  [markup.highlight]
    style = "dracula"
    lineNos = false
    noClasses = false

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block = [["$$", "$$"], ["\\[", "\\]"]]
        inline = [["$", "$"], ["\\(", "\\)"]]

# Services
[services]
  [services.disqus]
    shortname = ""
  [services.googleAnalytics]
    id = ""

# Privacy
[privacy]
  [privacy.x]
    enableDNT = true
  [privacy.youtube]
    privacyEnhanced = true
